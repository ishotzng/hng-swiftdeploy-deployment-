services:
  app:
    image: swift-deploy-1-node:latest
    container_name: swiftdeploy-app
    environment:
      MODE: "stable"
      APP_VERSION: "1.0.0"
      APP_PORT: "3000"
    networks:
      - swiftdeploy-net
    restart: unless-stopped
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - swiftdeploy-logs:/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:latest
    container_name: swiftdeploy-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - swiftdeploy-logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - swiftdeploy-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: >
      sh -c "touch /var/log/nginx/access.log &&
             chmod 666 /var/log/nginx/access.log &&
             nginx -g 'daemon off;'"

networks:
  swiftdeploy-net:
    name: swiftdeploy-net
    driver: bridge

volumes:
  swiftdeploy-logs:
